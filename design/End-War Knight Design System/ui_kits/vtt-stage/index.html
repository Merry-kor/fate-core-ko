<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>종전의 기사 — VTT 무대</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font-sans);}

/* ── Layout ── */
.app{display:flex;flex-direction:column;width:100vw;height:100vh;overflow:hidden;}
.content{display:flex;flex:1;min-height:0;overflow:hidden;}

/* ── Stage ── */
.stage{flex:1;position:relative;overflow:hidden;min-width:0;}
.stage-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:background-image .7s ease;z-index:0;}
.stage-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,11,15,.2) 0%,rgba(10,11,15,.55) 85%);transition:background .6s;}

/* Scene rail */
.scene-rail{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:8px;padding:10px 12px;background:linear-gradient(180deg,rgba(10,11,15,.88) 0%,transparent 100%);}
.scene-lbl{font-size:var(--fs-2xs);font-weight:var(--fw-bold);letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--text-muted);flex-shrink:0;}
.chapter-sel{flex-shrink:0;background:rgba(10,11,15,.85);border:1px solid var(--ewk-gold-600);border-radius:var(--radius-sm);color:var(--ewk-gold-300);font-family:var(--font-sans);font-size:var(--fs-xs);font-weight:var(--fw-bold);padding:4px 8px;cursor:pointer;outline:none;}
.chapter-sel option{background:#14161e;}
.scene-thumbs{display:flex;gap:7px;overflow-x:auto;flex:1;}
.scene-thumbs::-webkit-scrollbar{height:3px;}
.scene-thumbs::-webkit-scrollbar-thumb{background:var(--ewk-gold-700);border-radius:2px;}
.scene-thumb{flex-shrink:0;width:104px;height:62px;border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s,transform .15s;position:relative;}
.scene-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.scene-thumb::after{content:attr(data-name);position:absolute;bottom:0;left:0;right:0;padding:2px 5px;background:linear-gradient(0deg,rgba(10,11,15,.9) 0%,transparent 100%);font-size:9px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.scene-thumb:hover{transform:translateY(-2px);border-color:var(--ewk-steel-400);}
.scene-thumb.active{border-color:var(--ewk-gold-500);}
.scene-thumb.active::before{content:"ON";position:absolute;top:3px;left:3px;z-index:2;background:var(--ewk-gold-500);color:var(--ewk-ink-900);font-size:8px;font-weight:900;padding:1px 4px;border-radius:2px;}

/* Aspect widget — draggable + resizable */
.aspect-widget{position:absolute;top:90px;left:50%;transform:translateX(-50%);z-index:30;border:1px solid var(--ewk-gold-600);border-radius:var(--radius-md);width:310px;min-width:200px;box-shadow:0 4px 24px rgba(0,0,0,.65);}
.aw-header{display:flex;align-items:center;gap:6px;padding:7px 10px;border-bottom:1px solid var(--ewk-gold-700);cursor:grab;}
.aw-header:active{cursor:grabbing;}
.aw-title{font-size:var(--fs-2xs);font-weight:var(--fw-bold);letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--ewk-gold-400);flex:1;}
.aw-hbtn{background:transparent;border:none;cursor:pointer;color:var(--text-muted);padding:1px 5px;font-size:13px;flex-shrink:0;}
.aw-hbtn:hover{color:var(--text-body);}
.aw-body{padding:7px 9px;display:flex;flex-direction:column;gap:4px;}
.aw-asp{display:flex;align-items:center;gap:7px;padding:5px 8px 5px 9px;border:1px solid rgba(255,255,255,.07);border-left:3px solid;border-radius:3px;}
.aw-asp.situation{border-left-color:var(--ewk-aspect-situation);}
.aw-asp.identity{border-left-color:var(--ewk-aspect-identity);}
.aw-asp.shortterm{border-left-color:var(--ewk-aspect-stack);}
.aw-asp-txt{flex:1;font-family:var(--font-serif);font-style:italic;font-size:var(--fs-xs);color:var(--text-strong);background:transparent;border:none;min-width:0;width:100%;}
.aw-asp-txt:focus{outline:none;}
.aw-tag{font-size:9px;font-weight:700;color:var(--ewk-aspect-stack);background:rgba(63,158,158,.15);border:1px solid rgba(63,158,158,.3);border-radius:var(--radius-pill);padding:1px 5px;flex-shrink:0;}
.aw-pip{width:7px;height:7px;border-radius:50%;background:var(--ewk-gold-500);flex-shrink:0;}
.aw-asp-view{flex:1;font-family:var(--font-serif);font-style:italic;font-size:var(--fs-xs);color:var(--text-strong);min-width:0;line-height:var(--lh-snug);}
.aw-edit{background:transparent;border:none;cursor:pointer;color:var(--text-faint);font-size:11px;opacity:0;flex-shrink:0;padding:0 2px;}
.aw-asp:hover .aw-edit{opacity:1;}
.aw-edit:hover{color:var(--ewk-gold-400);}
.aw-confirm{background:transparent;border:none;cursor:pointer;color:var(--ewk-outcome-succeed,#4fae6b);font-size:13px;flex-shrink:0;padding:0 3px;font-weight:700;}
.aw-confirm:hover{filter:brightness(1.3);}
.aw-del{background:transparent;border:none;cursor:pointer;color:var(--text-faint);font-size:11px;opacity:0;flex-shrink:0;padding:0 2px;}
.aw-asp:hover .aw-del{opacity:1;}
.aw-del:hover{color:var(--ewk-crimson-400);}
.aw-footer{padding:5px 9px;border-top:1px solid rgba(255,255,255,.05);}
.aw-addbtn{width:100%;background:transparent;border:1px dashed var(--ewk-gold-700);border-radius:var(--radius-sm);color:var(--ewk-gold-500);font-size:var(--fs-xs);padding:3px 8px;cursor:pointer;}
.aw-addbtn:hover{background:rgba(201,162,39,.07);}
.aw-resize{position:absolute;bottom:3px;right:3px;width:13px;height:13px;cursor:se-resize;}
.aw-resize::before,.aw-resize::after{content:"";position:absolute;background:var(--ewk-gold-600);border-radius:1px;}
.aw-resize::before{bottom:1px;right:1px;width:9px;height:2px;}
.aw-resize::after{bottom:1px;right:1px;width:2px;height:9px;}

/* VN portrait */
.vn-display{position:absolute;bottom:0;left:0;z-index:10;width:280px;pointer-events:none;opacity:0;transform:translateY(12px);transition:opacity .4s,transform .4s;}
.vn-display.active{opacity:1;transform:translateY(0);}
.vn-portrait{width:240px;height:360px;object-fit:cover;object-position:top center;display:block;filter:drop-shadow(0 4px 28px rgba(0,0,0,.8));border-radius:0 var(--radius-md) 0 0;}

/* VN speech box */
.vn-speech-box{position:absolute;bottom:0;left:0;right:0;z-index:11;padding:18px 24px 22px 264px;opacity:0;transform:translateY(8px);transition:opacity .4s,transform .4s;pointer-events:none;background:linear-gradient(0deg,rgba(10,11,15,.94) 0%,rgba(10,11,15,.72) 60%,transparent 100%);}
.vn-speech-box.visible{opacity:1;transform:translateY(0);}
.vn-speech-name{font-family:var(--font-sans);font-size:var(--fs-sm);font-weight:var(--fw-bold);letter-spacing:var(--ls-wide);margin-bottom:5px;}
.vn-speech-text{font-family:var(--font-serif);font-size:var(--fs-lg);line-height:var(--lh-snug);color:var(--ewk-steel-050);text-wrap:pretty;max-width:68ch;}
.vn-cursor{display:inline-block;width:2px;height:.95em;background:currentColor;vertical-align:middle;animation:blink .75s step-end infinite;margin-left:1px;}
@keyframes blink{50%{opacity:0}}

/* Resize handle */
.resize-handle{width:5px;background:var(--border-strong);cursor:col-resize;flex-shrink:0;transition:background .15s;}
.resize-handle:hover,.resize-handle.dragging{background:var(--ewk-gold-600);}

/* ── Sidebar ── */
.sidebar{width:380px;min-width:260px;max-width:660px;flex-shrink:0;display:flex;flex-direction:column;}
.sidebar-tabs{display:flex;align-items:center;gap:2px;padding:5px 7px;border-bottom:1px solid var(--border-strong);flex-shrink:0;}
.stab{min-width:34px;height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:transparent;border:1px solid transparent;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s,border-color .15s;padding:0 6px;gap:1px;}
.stab .si{font-size:15px;line-height:1;}
.stab .sl{font-size:7px;font-weight:var(--fw-bold);letter-spacing:.03em;color:var(--text-faint);white-space:nowrap;}
.stab:hover{background:rgba(255,255,255,.06);}
.stab.active{background:rgba(201,162,39,.1);border-color:var(--ewk-gold-600);}
.stab.active .sl{color:var(--ewk-gold-400);}
.sidebar-body{flex:1;overflow:hidden;min-height:0;}
.spanel{display:none;flex-direction:column;height:100%;}
.spanel.active{display:flex;}

/* Chat panel */
.sp-chat-hdr{display:flex;align-items:center;gap:4px;padding:8px 11px;border-bottom:1px solid var(--border-strong);flex-shrink:0;}
.chat-title{font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--text-muted);letter-spacing:var(--ls-wide);}
.chat-scene-badge{font-size:var(--fs-2xs);color:var(--ewk-gold-400);background:color-mix(in srgb,var(--ewk-gold-500) 12%,transparent);border:1px solid var(--ewk-gold-700);border-radius:var(--radius-pill);padding:2px 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;margin-right:auto;}
.hdr-icn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid var(--border-hairline);border-radius:var(--radius-xs);cursor:pointer;font-size:12px;color:var(--text-muted);transition:border-color .15s,color .15s;}
.hdr-icn:hover{color:var(--text-body);border-color:var(--ewk-steel-400);}
.hdr-icn.danger:hover{color:var(--ewk-crimson-400);border-color:var(--ewk-crimson-600);}
.chat-msgs{flex:1;overflow-y:auto;padding:10px 12px;}
.chat-msgs::-webkit-scrollbar{width:3px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px;}

/* Messages */
.msg-wrap{position:relative;}
.msg-wrap:hover .msg-acts{opacity:1;}
.msg-acts{position:absolute;top:3px;right:2px;display:flex;gap:2px;opacity:0;transition:opacity .15s;z-index:2;}
.mact{width:20px;height:20px;background:var(--surface-card);border:1px solid var(--border-strong);border-radius:3px;cursor:pointer;font-size:10px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;padding:0;}
.mact:hover{color:var(--text-body);}
.mact.del:hover{color:var(--ewk-crimson-400);border-color:var(--ewk-crimson-600);}
.msg-narration{margin:10px 0;font-family:var(--font-serif);font-size:var(--fs-prose);line-height:var(--lh-prose);color:var(--ewk-steel-100);text-indent:1.1em;text-wrap:pretty;padding-right:26px;}
.msg-system{display:flex;align-items:center;gap:7px;margin:6px 0;padding:4px 9px;border-left:2px solid var(--ewk-gold-600);background:rgba(201,162,39,.06);font-size:var(--fs-sm);color:var(--ewk-gold-300);letter-spacing:var(--ls-wide);}
.msg-dlg{display:flex;gap:8px;margin:10px 0;padding-right:26px;}
.msg-av img{width:34px;height:34px;border-radius:50%;object-fit:cover;border-width:2px;border-style:solid;display:block;flex-shrink:0;}
.msg-bd{flex:1;min-width:0;}
.msg-spk{font-family:var(--font-sans);font-weight:var(--fw-bold);font-size:var(--fs-sm);margin-bottom:2px;}
.msg-txt{font-family:var(--font-serif);font-size:var(--fs-prose);line-height:var(--lh-prose);color:var(--ewk-steel-050);text-wrap:pretty;}
.msg-edit-inp{width:100%;background:var(--surface-input);border:1px solid var(--ewk-gold-600);border-radius:3px;color:var(--text-body);font-family:var(--font-serif);font-size:var(--fs-prose);padding:3px 7px;outline:none;}

/* Roll card */
.msg-roll{margin:8px 0;background:var(--surface-card);border:1px solid var(--border-strong);border-top:2px solid var(--ewk-gold-600);border-radius:var(--radius-md);padding:9px 11px;}
.roll-hdr{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.roll-av{width:20px;height:20px;border-radius:50%;object-fit:cover;border:2px solid var(--ewk-gold-600);}
.roll-nm{font-weight:var(--fw-bold);font-size:var(--fs-sm);}
.roll-tag{font-size:var(--fs-2xs);color:var(--ewk-crimson-400);background:color-mix(in srgb,var(--ewk-crimson-600) 14%,transparent);border:1px solid var(--ewk-crimson-700);border-radius:var(--radius-pill);padding:1px 7px;margin-left:auto;}
.roll-dice{display:flex;align-items:center;gap:4px;margin-bottom:7px;}
.fdie{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:4px;font-size:13px;font-weight:900;border:2px solid;}
.fdie.p{border-color:#2e6e44;color:var(--ewk-outcome-succeed);background:rgba(79,174,107,.12);}
.fdie.m{border-color:#7a1626;color:var(--ewk-outcome-fail);background:rgba(210,49,72,.12);}
.fdie.b{border-color:var(--ewk-steel-500);color:var(--text-faint);}
.roll-mod{font-size:var(--fs-base);font-weight:var(--fw-bold);color:var(--text-muted);}
.roll-res{display:flex;align-items:baseline;gap:10px;}
.roll-tot{font-family:var(--font-serif);font-size:var(--fs-3xl);font-weight:900;line-height:1;font-variant-numeric:tabular-nums;}
.roll-lad{font-family:var(--font-serif);font-style:italic;font-size:var(--fs-md);color:var(--ewk-gold-300);}
.roll-out{margin-top:6px;}
.opill{display:inline-block;font-size:var(--fs-xs);font-weight:700;letter-spacing:var(--ls-label);text-transform:uppercase;padding:2px 12px;border-radius:var(--radius-pill);border:1px solid;}
.o-style{color:var(--ewk-outcome-style);background:color-mix(in srgb,var(--ewk-outcome-style) 14%,transparent);border-color:color-mix(in srgb,var(--ewk-outcome-style) 40%,transparent);}
.o-succeed{color:var(--ewk-outcome-succeed);background:color-mix(in srgb,var(--ewk-outcome-succeed) 14%,transparent);border-color:color-mix(in srgb,var(--ewk-outcome-succeed) 40%,transparent);}
.o-tie{color:var(--ewk-outcome-tie);background:color-mix(in srgb,var(--ewk-outcome-tie) 14%,transparent);border-color:color-mix(in srgb,var(--ewk-outcome-tie) 40%,transparent);}
.o-fail{color:var(--ewk-outcome-fail);background:color-mix(in srgb,var(--ewk-outcome-fail) 14%,transparent);border-color:color-mix(in srgb,var(--ewk-outcome-fail) 40%,transparent);}

/* Emotion animations */
.emo-shake{display:inline-block;animation:eshake .3s linear infinite;}
@keyframes eshake{0%{transform:translate(0)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-1px,2px)}100%{transform:translate(1px,-1px)}}
.emo-shout{font-size:1.18em;font-weight:var(--fw-black);letter-spacing:.04em;}
.emo-glow{animation:eglow 1.6s ease-in-out infinite alternate;}
@keyframes eglow{0%{text-shadow:0 0 4px currentColor}100%{text-shadow:0 0 14px currentColor,0 0 24px currentColor}}
@keyframes ewave{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* Chat tools + input */
.chat-tools{display:flex;align-items:center;gap:3px;padding:5px 10px;border-top:1px solid var(--border-strong);flex-wrap:wrap;flex-shrink:0;}
.tool-btn{height:24px;padding:0 7px;background:transparent;border:1px solid var(--border-strong);border-radius:var(--radius-sm);cursor:pointer;font-size:11px;color:var(--text-muted);white-space:nowrap;transition:background .15s,color .15s,border-color .15s;}
.tool-btn:hover{background:rgba(255,255,255,.05);color:var(--text-body);}
.tool-btn.on{background:rgba(201,162,39,.12);border-color:var(--ewk-gold-600);color:var(--ewk-gold-400);}
.tool-sep{width:1px;height:16px;background:var(--border-strong);flex-shrink:0;margin:0 1px;}
.chat-input-row{display:flex;gap:6px;padding:7px 10px 9px;flex-shrink:0;}
.chat-input-field{flex:1;background:var(--surface-input);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-body);font-family:var(--font-serif);font-size:var(--fs-sm);padding:6px 10px;outline:none;transition:border-color .15s;}
.chat-input-field:focus{border-color:var(--ewk-gold-600);}
.chat-send-btn{padding:6px 12px;background:var(--ewk-gold-500);color:var(--ewk-ink-900);border:none;border-radius:var(--radius-sm);font-weight:var(--fw-bold);font-size:var(--fs-sm);cursor:pointer;}
.chat-send-btn:hover{filter:brightness(1.1);}

/* HUD */
.hud{height:128px;flex-shrink:0;border-top:1px solid var(--ewk-gold-700);display:flex;align-items:center;gap:9px;padding:0 16px;overflow-x:auto;}
.hud::-webkit-scrollbar{height:3px;}
.hud::-webkit-scrollbar-thumb{background:var(--ewk-gold-700);border-radius:2px;}
.hud-card{width:186px;flex-shrink:0;display:flex;align-items:center;gap:7px;padding:7px 8px;border:1px solid var(--border-strong);border-radius:var(--radius-md);cursor:pointer;transition:border-color .2s,box-shadow .2s,background .2s;}
.hud-card.active{border-color:var(--ewk-gold-600);box-shadow:var(--shadow-gold);}
.hud-port{width:40px;height:40px;border-radius:var(--radius-xs);border:2px solid;object-fit:cover;flex-shrink:0;object-position:top;}
.hud-info{flex:1;min-width:0;}
.hud-nm{font-size:var(--fs-xs);font-weight:var(--fw-bold);color:var(--text-strong);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hud-div{font-size:8px;color:var(--text-faint);letter-spacing:var(--ls-wide);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hud-fp{display:flex;align-items:center;gap:3px;margin-top:3px;}
.hud-fp-n{font-family:var(--font-serif);font-weight:900;font-size:var(--fs-base);color:var(--ewk-gold-300);line-height:1;}
.hud-fp-l{font-size:8px;color:var(--text-muted);}
.hud-btns{display:flex;flex-direction:column;gap:3px;}
.hud-btn{width:26px;height:26px;border-radius:var(--radius-sm);border:1px solid;background:transparent;cursor:pointer;font-size:var(--fs-sm);display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;}
.hud-btn.stg{border-color:var(--ewk-gold-600);color:var(--ewk-gold-400);}
.hud-btn.stg:hover,.hud-btn.stg.on{background:var(--ewk-gold-500);color:var(--ewk-ink-900);}
.hud-btn.spk{border-color:var(--border-hairline);color:var(--text-muted);}
.hud-btn.spk.on{background:var(--ewk-gold-500);color:var(--ewk-ink-900);}

/* ── Sidebar panels ── */
.sp-scroll{overflow-y:auto;flex:1;padding:8px;}
.sp-scroll::-webkit-scrollbar{width:3px;}
.sp-scroll::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px;}
.ch-grp{margin-bottom:6px;}
.ch-hdr{display:flex;align-items:center;gap:5px;padding:4px 8px;font-size:var(--fs-2xs);font-weight:var(--fw-bold);letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--ewk-gold-400);cursor:pointer;border-radius:var(--radius-sm);}
.ch-hdr:hover{background:rgba(255,255,255,.04);}
.ch-arrow{font-size:9px;transition:transform .15s;}
.ch-body{display:flex;flex-direction:column;gap:2px;padding-left:6px;}
.ch-body.collapsed{display:none;}
.sc-item{display:flex;align-items:center;gap:7px;padding:4px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;}
.sc-item:hover{background:rgba(255,255,255,.05);}
.sc-item.active{background:rgba(201,162,39,.1);outline:1px solid var(--ewk-gold-700);}
.sc-thumb{width:48px;height:30px;border-radius:3px;object-fit:cover;flex-shrink:0;}
.sc-nm{font-size:var(--fs-sm);color:var(--text-body);}
.actor-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border-strong);cursor:pointer;transition:background .15s;}
.actor-row:hover{background:rgba(255,255,255,.04);}
.actor-row.spk-active{background:rgba(201,162,39,.08);}
.ac-port{width:42px;height:42px;border-radius:var(--radius-sm);object-fit:cover;object-position:top;border:2px solid;flex-shrink:0;}
.ac-info{flex:1;min-width:0;}
.ac-nm{font-size:var(--fs-sm);font-weight:var(--fw-bold);}
.ac-role{font-size:var(--fs-2xs);color:var(--text-muted);letter-spacing:var(--ls-wide);}
.ac-fp{font-family:var(--font-serif);font-weight:900;font-size:var(--fs-sm);color:var(--ewk-gold-300);background:rgba(201,162,39,.1);border:1px solid var(--ewk-gold-700);border-radius:var(--radius-pill);padding:2px 7px;flex-shrink:0;}
.ac-stg-btn{width:24px;height:24px;border-radius:var(--radius-sm);border:1px solid var(--ewk-gold-600);background:transparent;cursor:pointer;color:var(--ewk-gold-400);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ac-stg-btn:hover,.ac-stg-btn.on{background:var(--ewk-gold-500);color:var(--ewk-ink-900);}
/* ── Journal entries ── */
.jnl-toolbar{display:flex;align-items:center;gap:6px;padding:8px 10px;border-bottom:1px solid var(--border-strong);flex-shrink:0;}
.jnl-add-btn{display:flex;align-items:center;gap:3px;padding:4px 10px;background:var(--ewk-gold-500);color:var(--ewk-ink-900);border:none;border-radius:var(--radius-sm);font-size:var(--fs-xs);font-weight:var(--fw-bold);cursor:pointer;white-space:nowrap;}
.jnl-add-btn:hover{filter:brightness(1.1);}
.jnl-search{flex:1;background:var(--surface-well);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-body);font-size:var(--fs-xs);padding:4px 8px;outline:none;}
.jnl-search:focus{border-color:var(--ewk-gold-600);}
.jnl-list{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:3px;}
.jnl-list::-webkit-scrollbar{width:3px;}
.jnl-list::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px;}
.jnl-entry{border:1px solid var(--border-strong);border-radius:var(--radius-sm);overflow:hidden;transition:border-color .15s;}
.jnl-entry.open{border-color:var(--ewk-gold-600);}
.jnl-entry-hdr{display:flex;align-items:center;gap:6px;padding:7px 9px;cursor:pointer;transition:background .15s;}
.jnl-entry-hdr:hover{background:rgba(255,255,255,.04);}
.jnl-entry-icon{font-size:13px;flex-shrink:0;}
.jnl-entry-title{flex:1;font-size:var(--fs-sm);font-weight:var(--fw-semibold);color:var(--text-strong);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.jnl-entry-cat{font-size:9px;font-weight:var(--fw-bold);letter-spacing:.04em;color:var(--ewk-gold-400);background:rgba(201,162,39,.1);border:1px solid var(--ewk-gold-700);border-radius:var(--radius-pill);padding:1px 6px;flex-shrink:0;}
.jnl-entry-btn{width:20px;height:20px;background:transparent;border:none;cursor:pointer;color:var(--text-faint);font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;flex-shrink:0;border-radius:var(--radius-xs);}
.jnl-entry-hdr:hover .jnl-entry-btn{opacity:1;}
.jnl-entry-btn:hover{color:var(--text-body);background:rgba(255,255,255,.06);}
.jnl-entry-btn.del:hover{color:var(--ewk-crimson-400);}
.jnl-entry-arrow{font-size:9px;color:var(--text-faint);transition:transform .15s;flex-shrink:0;}
.jnl-entry.open .jnl-entry-arrow{transform:rotate(90deg);}
.jnl-entry-body{display:none;padding:9px 10px;border-top:1px solid var(--border-strong);background:var(--surface-well);}
.jnl-entry.open .jnl-entry-body{display:block;}
.jnl-entry-ta{width:100%;background:transparent;border:none;color:var(--text-body);font-family:var(--font-serif);font-size:var(--fs-sm);line-height:var(--lh-prose);resize:vertical;min-height:72px;outline:none;}
.jnl-entry-footer{display:flex;align-items:center;gap:6px;margin-top:7px;padding-top:6px;border-top:1px solid rgba(255,255,255,.05);}
.jnl-entry-date{font-size:9px;color:var(--text-faint);flex:1;}
.jnl-save-btn{padding:3px 10px;background:var(--ewk-gold-500);color:var(--ewk-ink-900);border:none;border-radius:var(--radius-sm);font-size:var(--fs-xs);font-weight:var(--fw-bold);cursor:pointer;}
.jnl-empty{text-align:center;color:var(--text-faint);font-size:var(--fs-sm);padding:36px 16px;line-height:1.8;}
.jnl-new-form{border:1px solid var(--ewk-gold-600);border-radius:var(--radius-sm);padding:10px;background:rgba(201,162,39,.04);display:flex;flex-direction:column;gap:6px;}
.jnl-new-title-inp{background:var(--surface-well);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-body);font-size:var(--fs-sm);font-weight:var(--fw-semibold);padding:5px 8px;outline:none;width:100%;}
.jnl-new-title-inp:focus{border-color:var(--ewk-gold-600);}
.jnl-new-ta{background:var(--surface-well);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-body);font-family:var(--font-serif);font-size:var(--fs-sm);padding:5px 8px;outline:none;width:100%;resize:vertical;min-height:60px;}
.jnl-new-ta:focus{border-color:var(--ewk-gold-600);}
.jnl-new-row{display:flex;gap:6px;align-items:center;}
.jnl-cat-sel{background:var(--surface-well);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-muted);font-size:var(--fs-xs);padding:4px 6px;outline:none;flex:1;}
/* Paper theme journal */
.app[data-theme="paper"] .jnl-entry{border-color:#cbb588;background:#ece3ca;}
.app[data-theme="paper"] .jnl-entry.open{border-color:#97761b;}
.app[data-theme="paper"] .jnl-entry-hdr:hover{background:rgba(0,0,0,.03);}
.app[data-theme="paper"] .jnl-entry-title{color:#2a2317;}

.app[data-theme="paper"] .jnl-entry-ta{color:#2a2317;}

.app[data-theme="paper"] .jnl-new-title-inp,.app[data-theme="paper"] .jnl-new-ta,.app[data-theme="paper"] .jnl-cat-sel{background:#efe5cc;border-color:#cbb588;color:#2a2317;}
.macro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:10px;}
.macro-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;background:var(--surface-card);border:1px solid var(--border-strong);border-radius:var(--radius-sm);cursor:pointer;transition:background .15s,border-color .15s;}
.macro-btn:hover{background:rgba(255,255,255,.06);border-color:var(--ewk-steel-400);}
.macro-icon{font-size:18px;}
.macro-lbl{font-size:8.5px;font-weight:var(--fw-bold);color:var(--text-muted);letter-spacing:.03em;text-align:center;}
.set-body{flex:1;overflow-y:auto;padding:12px;}
.set-sec{margin-bottom:18px;}
.set-ttl{font-size:var(--fs-2xs);font-weight:var(--fw-bold);letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--ewk-gold-400);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border-strong);}
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.th-opt{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 5px;background:var(--surface-card);border:2px solid var(--border-strong);border-radius:var(--radius-sm);cursor:pointer;transition:border-color .15s;}
.th-opt:hover{border-color:var(--ewk-steel-400);}
.th-opt.sel{border-color:var(--ewk-gold-500);}
.th-preview{width:100%;height:28px;border-radius:3px;overflow:hidden;display:flex;}
.th-nm{font-size:var(--fs-2xs);font-weight:var(--fw-semibold);color:var(--text-muted);}
.set-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.set-lbl{font-size:var(--fs-sm);color:var(--text-body);flex:1;}
.set-sel{background:var(--surface-well);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-body);font-size:var(--fs-sm);padding:4px 7px;outline:none;cursor:pointer;}
.set-sel:focus{border-color:var(--ewk-gold-600);}
.music-ph{padding:30px 20px;text-align:center;color:var(--text-faint);font-size:var(--fs-sm);}

/* ── Dark theme (base) ── */
.app[data-theme="dark"]{background:var(--ewk-ink-900);}
.app[data-theme="dark"] .sidebar{background:var(--ewk-ink-800);border-left:1px solid var(--border-strong);}
.app[data-theme="dark"] .sidebar-tabs{background:var(--ewk-ink-850);border-bottom-color:var(--border-strong);}
.app[data-theme="dark"] .sp-chat-hdr{background:var(--ewk-ink-850);}

.app[data-theme="dark"] .hud-card{background:var(--ewk-ink-700);}

.app[data-theme="paper"] .msg-roll{background:#efe5cc;border-color:#cbb588;border-top-color:#97761b;}

.app[data-theme="paper"] .fdie.b{border-color:#cbb588;color:#8a7a5c;}

.app[data-theme="paper"] .chat-input-row{border-top-color:#cbb588;}
.app[data-theme="paper"] .chat-input-field{background:#efe5cc;border-color:#cbb588;color:#2a2317;}
.app[data-theme="paper"] .chat-input-field:focus{border-color:#97761b;}
.app[data-theme="paper"] .chat-input-field::placeholder{color:#8a7a5c;}
.app[data-theme="paper"] .chat-send-btn{background:#97761b;color:#fff;}
.app[data-theme="paper"] .hud{background:linear-gradient(180deg,#e8dfc8 0%,#dfd5bc 100%);border-top-color:#cbb588;}
.app[data-theme="paper"] .hud-card{background:#ece3ca;border-color:#cbb588;}
.app[data-theme="paper"] .hud-card.active{background:linear-gradient(180deg,rgba(150,113,30,.1),#ece3ca);border-color:#97761b;box-shadow:0 0 12px rgba(150,113,30,.3);}
.app[data-theme="paper"] .hud-nm{color:#2a2317;}
.app[data-theme="paper"] .hud-fp-n{color:#6b5310;}
.app[data-theme="paper"] .hud-btn.stg{border-color:#97761b;color:#7a4d18;}
.app[data-theme="paper"] .hud-btn.stg:hover,.app[data-theme="paper"] .hud-btn.stg.on{background:#97761b;color:#fff;}
.app[data-theme="paper"] .hud-btn.spk.on{background:#97761b;color:#fff;}
.app[data-theme="paper"] .mact{background:#efe5cc;border-color:#cbb588;}
.app[data-theme="paper"] .vn-speech-box{background:linear-gradient(0deg,rgba(246,239,221,.96) 0%,rgba(246,239,221,.78) 60%,transparent 100%);}
.app[data-theme="paper"] .vn-speech-text{color:#1a1409;}

.app[data-theme="paper"] .stage-bg::after{background:linear-gradient(180deg,rgba(240,228,198,.12) 0%,rgba(240,228,198,.38) 85%);}

/* ── Slate theme ── */

/* ── Stage image overlay ── */
.stage-overlay{position:absolute;inset:0;z-index:15;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.62);backdrop-filter:blur(3px);}
.stage-overlay.active{display:flex;}
.overlay-img{max-width:72%;max-height:78%;object-fit:contain;border:2px solid var(--ewk-gold-500);border-radius:var(--radius-md);box-shadow:0 0 60px rgba(0,0,0,.8),0 0 20px var(--ewk-gold-glow);animation:ovIn .45s var(--ease-out);}
@keyframes ovIn{from{opacity:0;transform:scale(.86)}to{opacity:1;transform:scale(1)}}
.overlay-close{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:rgba(10,11,15,.9);border:1px solid var(--ewk-gold-600);color:var(--ewk-gold-400);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:16;transition:background .15s;}
.overlay-close:hover{background:var(--ewk-crimson-700);border-color:var(--ewk-crimson-500);color:#fff;}
.ov-panel{position:absolute;top:86px;right:14px;z-index:40;background:rgba(13,15,21,.94);border:1px solid var(--ewk-gold-600);border-radius:var(--radius-md);padding:10px 12px;backdrop-filter:blur(12px);display:none;flex-direction:column;gap:6px;width:270px;}
.ov-panel.open{display:flex;}
.ov-ttl{font-size:var(--fs-2xs);font-weight:var(--fw-bold);letter-spacing:var(--ls-label);color:var(--ewk-gold-400);text-transform:uppercase;}
.ov-inp{background:var(--surface-well);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-body);font-size:var(--fs-sm);padding:5px 8px;width:100%;outline:none;}
.ov-inp:focus{border-color:var(--ewk-gold-600);}
.ov-row{display:flex;gap:5px;}
.ovbtn{flex:1;padding:5px 0;border-radius:var(--radius-sm);border:1px solid;cursor:pointer;font-size:var(--fs-xs);font-weight:var(--fw-bold);}
.ovbtn.primary{background:var(--ewk-gold-500);border-color:var(--ewk-gold-500);color:var(--ewk-ink-900);}
.ovbtn.danger{background:transparent;border-color:var(--ewk-crimson-600);color:var(--ewk-crimson-400);}
.hud.drag-over{outline:2px dashed var(--ewk-gold-500);outline-offset:-3px;}
.actor-row[draggable="true"]{cursor:grab;}
.print-log-btn{display:flex;align-items:center;gap:4px;padding:3px 8px;background:transparent;border:1px solid var(--ewk-gold-700);border-radius:var(--radius-sm);color:var(--ewk-gold-400);font-size:var(--fs-xs);font-weight:var(--fw-bold);cursor:pointer;white-space:nowrap;text-decoration:none;transition:background .15s;flex-shrink:0;}
.print-log-btn:hover{background:rgba(201,162,39,.1);border-color:var(--ewk-gold-500);}
</style>

<body>
<div class="app" id="app" data-theme="dark">
  <div class="content">

    <!-- ── Stage ── -->
    <div class="stage" id="stage">
      <div class="stage-bg" id="stageBg"></div>

      <!-- Scene rail -->
      <div class="scene-rail">
        <span class="scene-lbl">장면</span>
        <select id="chapterSel" class="chapter-sel"></select>
        <div class="scene-thumbs" id="sceneThumbs"></div>
        <button class="hdr-icn" id="ovToggleBtn" title="이미지 오버레이" style="flex-shrink:0;display:none;">🖼</button>
      </div>

      <!-- Aspect widget -->
      <div class="aspect-widget" id="aspectWidget">
        <div class="aw-header" id="awDragHandle">
          <span class="aw-title" id="awTitle">장면 면모</span>
          <button class="aw-hbtn" id="awMinBtn" title="최소화">−</button>
        </div>
        <div class="aw-body" id="awBody"></div>
        <div class="aw-footer" id="awFooter">
          <button class="aw-addbtn" id="awAddBtn">＋ 면모 추가</button>
        </div>
        <div class="aw-resize" id="awResize"></div>
      </div>

      <!-- VN portrait -->
      <div class="vn-display" id="vnDisplay">
        <img class="vn-portrait" id="vnPortrait" src="" alt="">
      </div>

      <!-- VN speech box -->
      <div class="vn-speech-box" id="vnSpeechBox">
        <div class="vn-speech-name" id="vnSpeechName"></div>
        <div class="vn-speech-text" id="vnSpeechText"></div>
      </div>

      <!-- Stage image overlay -->
      <div class="stage-overlay" id="stageOverlay">
        <button class="overlay-close" id="overlayClose">×</button>
        <img class="overlay-img" id="overlayImg" src="" alt="핸드아웃">
      </div>

      <!-- GM overlay panel -->
      <div class="ov-panel" id="ovPanel">
        <div class="ov-ttl">🖼 무대 이미지 오버레이</div>
        <input class="ov-inp" id="ovUrl" type="text" placeholder="이미지 URL 또는 assets/ 경로...">

// ── Helpers ───────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function applyEmo(text, emo) {
  if (emo === 'shake') return `<span class="emo-shake">${esc(text)}</span>`;
  if (emo === 'shout') return `<span class="emo-shout">${esc(text)}</span>`;
  if (emo === 'glow')  return `<span class="emo-glow">${esc(text)}</span>`;
  if (emo === 'wave')  return [...text].map((ch,i)=>ch===' '?' ':`<span style="display:inline-block;animation:ewave .8s ${(i*.06).toFixed(2)}s ease-in-out infinite alternate">${esc(ch)}</span>`).join('');
  return esc(text);
}

// ── Scene / Chapter rail ──────────────────────────────────
function buildChapterDropdown() {
  const sel = document.getElementById('chapterSel');
  const chapters = [...new Set(SCENES.map(s => s.chapter))];
  sel.innerHTML = chapters.map(c=>`<option value="${c}">${c}</option>`).join('');
  const active = SCENES.find(s=>s.id===activeSceneId);
  if (active) sel.value = active.chapter;
  sel.onchange = renderSceneThumbs;
  renderSceneThumbs();
}

function renderSceneThumbs() {
  const ch = document.getElementById('chapterSel').value;
  const box = document.getElementById('sceneThumbs');
  box.innerHTML = '';
  SCENES.filter(s=>s.chapter===ch).forEach(s=>{
    const el = document.createElement('div');
    el.className = 'scene-thumb' + (s.id===activeSceneId?' active':'');
    el.dataset.name = s.name;
    el.innerHTML = `<img src="${s.img}" loading="lazy">`;
    el.onclick = () => activateScene(s.id);
    box.appendChild(el);
  });
}

function activateScene(id) {
  activeSceneId = id;
  // awCustomAspects는 장면과 무관하게 유지됨
  const s = SCENES.find(x=>x.id===id);
  document.getElementById('stageBg').style.backgroundImage = `url(${s.img})`;
  document.getElementById('chatSceneBadge').textContent = s.chapter + ' · ' + s.name;
  document.getElementById('chapterSel').value = s.chapter;
  renderSceneThumbs();
  renderAspects();
  buildScenesList();
  addSystemMsg(`장면 변경: [${s.chapter}] ${s.name}`);
}

// ── Aspect widget ─────────────────────────────────────────
function renderAspects() {
  const s = SCENES.find(x=>x.id===activeSceneId);
  document.getElementById('awTitle').textContent = '현재 면모';
  const aspects = awCustomAspects || (s ? s.aspects : []);
  const body = document.getElementById('awBody');
  body.innerHTML = '';

  aspects.forEach((a, idx) => {
    const el = document.createElement('div');
    el.className = 'aw-asp ' + a.type;

    if (editingAspIdx === idx) {
      // 편집 모드: input + 확인(✓) + 삭제(×)
      const inputEl = document.createElement('input');
      inputEl.className = 'aw-asp-txt';
      inputEl.value = a.text;
      inputEl.placeholder = '면모 내용 입력 후 Enter';
      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'aw-confirm'; confirmBtn.title = '확인 (Enter)'; confirmBtn.textContent = '✓';
      const delBtn = document.createElement('button');
      delBtn.className = 'aw-del'; delBtn.title = '삭제'; delBtn.style.opacity='1'; delBtn.textContent = '×';
      el.append(inputEl, confirmBtn, delBtn);

      const oldText = a.text;
      const isNew   = !!a._isNew;

      const confirm = () => {
        const val = inputEl.value.trim();
        if (!val && isNew) { getAspects().splice(idx, 1); editingAspIdx = -1; renderAspects(); return; }
        getAspects()[idx].text = val;
        delete getAspects()[idx]._isNew;
        editingAspIdx = -1; saveAspects(); renderAspects();
        if (isNew && val)          addSystemMsg('면모 추가: 「' + val + '」');
        else if (!isNew && val !== oldText && oldText !== val) addSystemMsg('면모 수정: 「' + oldText + '」 → 「' + val + '」');
      };
      inputEl.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); confirm(); }
        if (e.key === 'Escape') { if (isNew) getAspects().splice(idx,1); editingAspIdx=-1; renderAspects(); }
      });
      confirmBtn.onclick = confirm;
      delBtn.onclick = () => {
        const txt = getAspects()[idx]?.text || '';
        getAspects().splice(idx, 1);
        editingAspIdx = -1; saveAspects(); renderAspects();
        if (txt && !isNew) addSystemMsg('면모 제거: 「' + txt + '」');
      };
      setTimeout(() => { inputEl.focus(); inputEl.select(); }, 0);
    } else {
      // 뷰 모드: 텍스트 + 편집(✏) + 삭제(×)
      const viewEl = document.createElement('span');
      viewEl.className = 'aw-asp-view';
      viewEl.textContent = a.text || '(빈 면모)';
      if (!a.text) viewEl.style.opacity = '.4';
      const editBtn = document.createElement('button');
      editBtn.className = 'aw-edit'; editBtn.title = '수정'; editBtn.textContent = '✏';
      const delBtn2 = document.createElement('button');
      delBtn2.className = 'aw-del'; delBtn2.title = '삭제'; delBtn2.textContent = '×';
      if (a.tag) {
        const tagEl = document.createElement('span');
        tagEl.className = 'aw-tag'; tagEl.textContent = a.tag;
        el.append(viewEl, tagEl);
      } else { el.append(viewEl); }
      if (a.pip) { const pip=document.createElement('span'); pip.className='aw-pip'; el.append(pip); }
      el.append(editBtn, delBtn2);

      editBtn.onclick  = () => { editingAspIdx = idx; renderAspects(); };
      delBtn2.onclick  = () => {
        const txt = getAspects()[idx]?.text || '(빈 면모)';
        getAspects().splice(idx, 1);
        editingAspIdx = -1; saveAspects(); renderAspects();
        addSystemMsg('면모 제거: 「' + txt + '」');
      };
    }
    body.appendChild(el);
  });

  if (!awOpen) { body.style.display='none'; document.getElementById('awFooter').style.display='none'; }
}

function getAspects() {
  if (!awCustomAspects) {
    const saved = localStorage.getItem('ewk-aspects');
    if (saved) {
      try { awCustomAspects = JSON.parse(saved); }
      catch(e) { awCustomAspects = []; }
    } else {
      // 최초 실행 시 첫 장면 기본 면모로 초기화
      const s = SCENES.find(x=>x.id===activeSceneId);
      awCustomAspects = s ? JSON.parse(JSON.stringify(s.aspects)) : [];
    }
  }
  return awCustomAspects;
}

// 채팅 전송 시 호출 — 무대에 초상화·대사 표시
function activateSpeaker(id) {
  activeSpeakerId = id;
  const a = ACTORS.find(x=>x.id===id);
  if (!a) return;
  document.getElementById('vnPortrait').src = a.img;
  document.getElementById('vnDisplay').classList.add('active');
  renderHUD();
}

function showSpeechBox(name, rawText, color) {
  const box = document.getElementById('vnSpeechBox');
  const nameEl = document.getElementById('vnSpeechName');
  const textEl = document.getElementById('vnSpeechText');
  nameEl.textContent = name;
  nameEl.style.color = color || 'var(--ewk-gold-300)';
  textEl.innerHTML = '';
  box.classList.add('visible');
  if (typeTimer) clearInterval(typeTimer);
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'vn-cursor';
  textEl.appendChild(cursor);
  typeTimer = setInterval(() => {
    if (i < rawText.length) {
      cursor.insertAdjacentText('beforebegin', rawText[i++]);
    } else {
      clearInterval(typeTimer); typeTimer = null;
      setTimeout(()=>{ if(cursor.parentNode) cursor.remove(); }, 2200);
    }
  }, typeSpeed);
}

function clearSpeechBox() {
  if (typeTimer) { clearInterval(typeTimer); typeTimer = null; }
  document.getElementById('vnSpeechBox').classList.remove('visible');
}

// ── HUD ───────────────────────────────────────────────────
function renderHUD() {
  const hud = document.getElementById('hud');
  hud.innerHTML = '';
  localHUD.forEach(hudId => {
    const a = ACTORS.find(x => x.id === hudId);
    if (!a) return;
    const isSpk = a.id === activeSpeakerId;
    const card = document.createElement('div');
    card.className = 'hud-card' + (isSpk ? ' active' : '');
    card.innerHTML = `
      <img class="hud-port" src="${a.img}" alt="${a.name}" style="border-color:${isSpk?'var(--ewk-gold-500)':'var(--ewk-steel-500)'}">
      <div class="hud-info">
        <div class="hud-nm">${a.name}</div>
        <div class="hud-div">${a.role}</div>
        <div class="hud-fp"><span class="hud-fp-n">${a.fp}</span><span class="hud-fp-l">운명점</span></div>
      </div>
      <div class="hud-btns">
        <button class="hud-btn stg on" title="HUD에서 제거">−</button>
        <button class="hud-btn spk ${isSpk?'on':''}" title="발언권"><i class="fa fa-comment"></i></button>
      </div>`;

    removeBtn.onclick = e => { e.stopPropagation(); removeFromHUD(a.id); };

function addToHUD(id) {
  if (!localHUD.includes(id)) {
    localHUD.push(id);
    localStorage.setItem('ewk-hud-roster', JSON.stringify(localHUD));
    renderHUD(); buildActorsList();
  }
}

function removeFromHUD(id) {
  localHUD = localHUD.filter(x => x !== id);
  localStorage.setItem('ewk-hud-roster', JSON.stringify(localHUD));
  if (id === activeSpeakerId) {
    activeSpeakerId = localHUD[0] || null;
    if (activeSpeakerId) selectSpeaker(activeSpeakerId);
    else { clearSpeechBox(); document.getElementById('vnDisplay').classList.remove('active'); }
  }
  renderHUD(); buildActorsList();
}

// ── Chat messages ─────────────────────────────────────────
function buildMsgEl(m) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap'; wrap.dataset.id = m.id;
  let inner = '';

  if (m.type === 'narration') {
    inner = `<div class="msg-narration">${applyEmo(m.text, m.emotion)}</div>`;
  } else if (m.type === 'system') {
    inner = `<div class="msg-system"><i class="fa fa-feather"></i><span>${esc(m.text)}</span></div>`;
  } else if (m.type === 'dialogue') {
    const a = ACTORS.find(x=>x.id===m.actor)||{};
    inner = `<div class="msg-dlg">
      <div class="msg-av"><img src="${a.img||''}" style="border-color:${a.color||'var(--ewk-gold-500)'}"></div>
      <div class="msg-bd">
        <div class="msg-spk" style="color:${a.color||'var(--ewk-gold-400)'}">${esc(a.name||m.actor)}</div>
        <div class="msg-txt">${applyEmo(m.text, m.emotion)}</div>
      </div></div>`;
  } else if (m.type === 'roll') {
    const a = ACTORS.find(x=>x.id===m.actor)||{};
    const tot = m.dice.reduce((s,d)=>s+d,0)+m.mod;
    const lad = {8:'전설적',7:'영웅적',6:'환상적',5:'엄청남',4:'대단함',3:'우수',2:'양호',1:'보통',0:'미약','-1':'부실','-2':'엉망'};
    const outs = {style:['압도적 성공','o-style'],succeed:['성공','o-succeed'],tie:['동점','o-tie'],fail:['실패','o-fail']};
    const [ol,oc] = outs[m.outcome]||['',''];
    inner = `<div class="msg-roll">
      <div class="roll-hdr"><img class="roll-av" src="${a.img||''}"><span class="roll-nm">${esc(a.name||m.actor)}</span>${m.action?`<span class="roll-tag">${esc(m.action)}</span>`:''}</div>
      <div class="roll-dice">${m.dice.map(d=>`<span class="fdie ${d>0?'p':d<0?'m':'b'}">${d>0?'+':d<0?'−':''}</span>`).join('')}<span class="roll-mod">${m.mod>=0?'+'+m.mod:m.mod}${m.skill?' ('+m.skill+')':''}</span></div>
      <div class="roll-res"><span class="roll-tot">${tot>=0?'+'+tot:tot}</span><span class="roll-lad">${lad[tot]||''}</span></div>
      ${ol?`<div class="roll-out"><span class="opill ${oc}">${ol}</span></div>`:''}
    </div>`;
  }

  if (m.type !== 'system' && m.type !== 'roll') {
    inner += `<div class="msg-acts"><button class="mact" data-act="edit" title="수정">✏️</button><button class="mact del" data-act="del" title="삭제">🗑</button></div>`;
  }

  wrap.innerHTML = inner;

  const editB = wrap.querySelector('[data-act="edit"]');
  const delB  = wrap.querySelector('[data-act="del"]');
  if (editB) editB.onclick = () => editMsg(m.id, wrap);
  if (delB)  delB.onclick  = () => delMsg(m.id, wrap);
  return wrap;
}

function addSystemMsg(text) {
  const m = {id:msgId++,type:'system',text};
  chatHistory.push(m);
  pushToChat(buildMsgEl(m));
}

function pushToChat(el) {
  const box = document.getElementById('chatMsgs');
  box.appendChild(el);
  if (autoScroll) box.scrollTop = box.scrollHeight;
}

// ── Send ──────────────────────────────────────────────────
function sendLine() {
  const inp = document.getElementById('chatInput');
  let text = inp.value.trim();
  if (!text) return;
  if (quoteMode) text = `「${text}」`;
  else if (dquoteMode) text = '“' + text + '”';
  const a = activeSpeakerId ? ACTORS.find(x=>x.id===activeSpeakerId) : null;
  const m = {id:msgId++, type: a?'dialogue':'narration', actor: a?a.id:null, text, emotion:currentEmo};
  chatHistory.push(m);
  pushToChat(buildMsgEl(m));
  inp.value = '';
  if (m.type==='dialogue' && a) {
    activateSpeaker(a.id);
    showSpeechBox(a.name, text, a.color);
  } else {
    clearSpeechBox();
  }
}

document.getElementById('chatInput').addEventListener('keydown', e=>{ if(e.key==='Enter') sendLine(); });
document.getElementById('sendBtn').onclick = sendLine;

// ── Edit / Delete / Clear / Download ─────────────────────
function editMsg(id, wrap) {
  const m = chatHistory.find(x=>x.id===id);
  if (!m) return;
  const textEl = wrap.querySelector('.msg-txt, .msg-narration');
  if (!textEl) return;
  const orig = m.text;
  const inp = document.createElement('input');
  inp.className = 'msg-edit-inp';
  inp.value = orig;
  const save = () => {
    const nv = inp.value.trim();
    m.text = nv || orig;
    textEl.innerHTML = applyEmo(m.text, m.emotion);
    inp.replaceWith(textEl);
  };
  inp.onkeydown = e => {
    if (e.key==='Enter') { e.preventDefault(); save(); }
    if (e.key==='Escape') { textEl.innerHTML=applyEmo(orig,m.emotion); inp.replaceWith(textEl); }
  };
  inp.onblur = save;
  textEl.replaceWith(inp);
  inp.focus(); inp.select();
}

function delMsg(id, wrap) {
  const idx = chatHistory.findIndex(x=>x.id===id);
  if (idx!==-1) chatHistory.splice(idx,1);
  wrap.remove();
}

document.getElementById('clearBtn').onclick = () => {

};

document.getElementById('downloadBtn').onclick = () => {
  const lines = chatHistory.map(m => {
    if (m.type==='system')    return `[시스템] ${m.text}`;
    if (m.type==='narration') return m.text;
    if (m.type==='dialogue')  { const a=ACTORS.find(x=>x.id===m.actor)||{}; return `${a.name||m.actor}: ${m.text}`; }
    if (m.type==='roll')      { const a=ACTORS.find(x=>x.id===m.actor)||{}; const tot=m.dice.reduce((s,d)=>s+d,0)+m.mod; return `[굴림] ${a.name||m.actor} ${m.skill||''} ${m.mod>=0?'+'+m.mod:m.mod} = ${tot>=0?'+'+tot:tot}`; }
    return '';
  }).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lines],{type:'text/plain;charset=utf-8'}));
  a.download = '채팅로그.txt'; a.click();
};

// ── Scenes sidebar panel ──────────────────────────────────
function buildScenesList() {
  const container = document.getElementById('scenesList');
  container.innerHTML = '';
  const chapters = [...new Set(SCENES.map(s=>s.chapter))];
  chapters.forEach(ch => {
    const grp = document.createElement('div'); grp.className = 'ch-grp';
    const hdr = document.createElement('div'); hdr.className = 'ch-hdr';
    const arrow = document.createElement('span'); arrow.className = 'ch-arrow'; arrow.textContent = '▾';
    hdr.appendChild(arrow); hdr.appendChild(document.createTextNode(' ' + ch));
    const body = document.createElement('div'); body.className = 'ch-body';
    SCENES.filter(s=>s.chapter===ch).forEach(s => {
      const item = document.createElement('div');
      item.className = 'sc-item' + (s.id===activeSceneId?' active':'');
      item.innerHTML = `<img class="sc-thumb" src="${s.img}" loading="lazy"><span class="sc-nm">${s.name}</span>`;

      body.appendChild(item);

    hdr.onclick = () => {
      collapsed = !collapsed;
      body.classList.toggle('collapsed', collapsed);
      arrow.style.transform = collapsed ? 'rotate(-90deg)' : '';
    };
    grp.appendChild(hdr); grp.appendChild(body);
    container.appendChild(grp);
  });
}

// ── Actors sidebar panel ──────────────────────────────────
function buildActorsList() {
  const container = document.getElementById('actorsList');
  container.innerHTML = '';
  ACTORS.forEach(a => {

    row.className = 'actor-row' + (isSpk ? ' spk-active' : '');

// ── Journal ─────────────────────────────────────────────────────────────────
const CATS = ['장면 메모','세계관','NPC','아이템','규칙','기타'];
const CAT_ICON = {'장면 메모':'🎭','세계관':'🌏','NPC':'👤','아이템':'⚔️','규칙':'📖','기타':'📄'};
let journals = JSON.parse(localStorage.getItem('ewk-journals') || '[]');
let jnlOpenId = null;
let jnlShowNew = false;

function saveJournals() { localStorage.setItem('ewk-journals', JSON.stringify(journals)); }

function buildJournalPanel(filter) {
  const list = document.getElementById('jnlList');
  list.innerHTML = '';
  const q = (filter || '').trim().toLowerCase();
  let entries = q ? journals.filter(j => j.title.toLowerCase().includes(q) || j.content.toLowerCase().includes(q)) : journals;

  // 새 항목 입력 폼
  if (jnlShowNew) {
    const form = document.createElement('div');
    form.className = 'jnl-new-form';
    form.innerHTML = `
      <input class="jnl-new-title-inp" id="jnlNewTitle" type="text" placeholder="항목 제목...">
      <select class="jnl-cat-sel" id="jnlNewCat">${CATS.map(c=>`<option>${c}</option>`).join('')}</select>
      <textarea class="jnl-new-ta" id="jnlNewContent" placeholder="내용 입력..."></textarea>
      <div class="jnl-new-row">
        <button class="jnl-save-btn" id="jnlNewSave">저장</button>
        <button class="jnl-cancel-btn" id="jnlNewCancel">취소</button>
      </div>`;
    list.appendChild(form);
    setTimeout(() => { const t = document.getElementById('jnlNewTitle'); if(t) t.focus(); }, 0);
    document.getElementById('jnlNewSave').onclick = () => {
      const title = document.getElementById('jnlNewTitle').value.trim();
      if (!title) { document.getElementById('jnlNewTitle').focus(); return; }
      const entry = {
        id: Date.now(),
        title,
        category: document.getElementById('jnlNewCat').value,
        content: document.getElementById('jnlNewContent').value,
        date: new Date().toLocaleDateString('ko-KR')
      };
      journals.unshift(entry);
      saveJournals();
      jnlShowNew = false;
      jnlOpenId = entry.id;
      buildJournalPanel();
    };
    document.getElementById('jnlNewCancel').onclick = () => { jnlShowNew = false; buildJournalPanel(); };
  }

  if (entries.length === 0 && !jnlShowNew) {
    const em = document.createElement('div');
    em.className = 'jnl-empty';
    em.textContent = '등록된 저널 항목이 없습니다.\n+ 새 항목 버튼으로 추가하세요.';
    em.style.whiteSpace = 'pre';
    list.appendChild(em);
    return;
  }

  entries.forEach(j => {
    const isOpen = jnlOpenId === j.id;
    const el = document.createElement('div');
    el.className = 'jnl-entry' + (isOpen ? ' open' : '');
    const icon = CAT_ICON[j.category] || '📄';
    el.innerHTML = `
      <div class="jnl-entry-hdr">
        <span class="jnl-entry-icon">${icon}</span>
        <span class="jnl-entry-arrow">▶</span>
        <span class="jnl-entry-title">${esc(j.title)}</span>
        <span class="jnl-entry-cat">${esc(j.category)}</span>
        <button class="jnl-entry-btn" title="수정">✏</button>
        <button class="jnl-entry-btn del" title="삭제">×</button>
      </div>
      <div class="jnl-entry-body">
        <textarea class="jnl-entry-ta" rows="5">${esc(j.content)}</textarea>
        <div class="jnl-entry-footer">
          <span class="jnl-entry-date">${esc(j.date)}</span>
          <button class="jnl-save-btn jnl-entry-save">저장</button>
        </div>
      </div>`;

    const hdr = el.querySelector('.jnl-entry-hdr');
    const [editBtn, delBtn] = el.querySelectorAll('.jnl-entry-btn');
    const ta = el.querySelector('.jnl-entry-ta');
    const saveBtn = el.querySelector('.jnl-entry-save');

    hdr.onclick = e => {
      if (e.target.closest('.jnl-entry-btn')) return;
      jnlOpenId = isOpen ? null : j.id;
      buildJournalPanel(document.getElementById('jnlSearch').value);
    };
    editBtn.onclick = e => {
      e.stopPropagation();
      const newTitle = prompt('항목 제목 수정:', j.title);
      if (newTitle !== null && newTitle.trim()) {
        j.title = newTitle.trim();
        saveJournals();
        buildJournalPanel(document.getElementById('jnlSearch').value);
      }
    };
    delBtn.onclick = e => {
      e.stopPropagation();
      if (!confirm('「' + j.title + '」를 삭제하시겠습니까?')) return;
      journals = journals.filter(x => x.id !== j.id);
      saveJournals();
      if (jnlOpenId === j.id) jnlOpenId = null;
      buildJournalPanel(document.getElementById('jnlSearch').value);
    };
    saveBtn.onclick = () => {
      j.content = ta.value;
      j.date = new Date().toLocaleDateString('ko-KR');
      saveJournals();
    };
    list.appendChild(el);
  });
}

document.getElementById('jnlAddBtn').onclick = () => { jnlShowNew = true; buildJournalPanel(); };
document.getElementById('jnlSearch').oninput = function() { buildJournalPanel(this.value); };

  });
}

function doRoll(actorId, action, mod) {
  const dice = [0,0,0,0].map(()=>[-1,-1,0,0,1,1][Math.floor(Math.random()*6)]);
  const tot = dice.reduce((s,d)=>s+d,0)+mod;
  const outs = [{min:3,r:'style'},{min:1,r:'succeed'},{min:0,r:'tie'},{min:-99,r:'fail'}];
  const outcome = outs.find(o=>tot>=o.min).r;
  const a = ACTORS.find(x=>x.id===actorId)||{};
  const m = {id:msgId++,type:'roll',actor:actorId,action,dice,mod,skill:a.role||'',outcome};
  chatHistory.push(m);
  pushToChat(buildMsgEl(m));
}

// ── Settings ──────────────────────────────────────────────
document.querySelectorAll('.th-opt').forEach(opt => {
  opt.onclick = () => {
    const t = opt.dataset.theme;
    document.getElementById('app').dataset.theme = t;
    localStorage.setItem('ewk-stage-theme', t);
    document.querySelectorAll('.th-opt').forEach(o=>o.classList.remove('sel'));
    opt.classList.add('sel');
  };
});

document.getElementById('widthSel').onchange = function() {
  document.getElementById('sidebar').style.width = this.value + 'px';
  localStorage.setItem('ewk-stage-w', this.value);
};

document.getElementById('autoScrollChk').onchange = function() { autoScroll = this.checked; };
document.getElementById('typeSpeedSel').onchange = function() { typeSpeed = parseInt(this.value); };
document.getElementById('roleSel').onchange = function() {
  isGM = this.value === 'gm';
  localStorage.setItem('ewk-role', this.value);
  applyGMState();
};

function applyGMState() {
  const rail = document.querySelector('.scene-rail');
  const ovBtn = document.getElementById('ovToggleBtn');
  rail.style.display = isGM ? '' : 'none';
  if (ovBtn) ovBtn.style.display = isGM ? '' : 'none';
  if (!isGM) document.getElementById('ovPanel').classList.remove('open');
  const sel = document.getElementById('roleSel');
  if (sel) sel.value = isGM ? 'gm' : 'player';
}

// ── Overlay handlers ──────────────────────────────────────────────
document.getElementById('ovToggleBtn').onclick = () => document.getElementById('ovPanel').classList.toggle('open');
document.getElementById('overlayClose').onclick = () => document.getElementById('stageOverlay').classList.remove('active');
document.getElementById('ovHide').onclick = () => {
  document.getElementById('stageOverlay').classList.remove('active');
  document.getElementById('ovPanel').classList.remove('open');
};
document.getElementById('ovShow').onclick = () => {
  const url = document.getElementById('ovUrl').value.trim();
  if (!url) return;
  document.getElementById('overlayImg').src = url;
  document.getElementById('stageOverlay').classList.add('active');
  document.getElementById('ovPanel').classList.remove('open');
};

// ── HUD drag-and-drop ───────────────────────────────────────
const hudEl = document.getElementById('hud');
hudEl.addEventListener('dragover', e => { e.preventDefault(); hudEl.classList.add('drag-over'); });
hudEl.addEventListener('dragleave', () => hudEl.classList.remove('drag-over'));
hudEl.addEventListener('drop', e => {
  e.preventDefault();
  hudEl.classList.remove('drag-over');
  const id = e.dataTransfer.getData('text/plain');
  if (id) addToHUD(id);
});

// ── Panel resize handle ───────────────────────────────────
const rszPanel = {active:false};
document.getElementById('resizeHandle').addEventListener('mousedown', e => {
  Object.assign(rszPanel, {active:true, sx:e.clientX, ow:document.getElementById('sidebar').getBoundingClientRect().width});
  document.getElementById('resizeHandle').classList.add('dragging');
  e.preventDefault();
});

document.getElementById('app').dataset.theme = savedTheme;
document.querySelectorAll('.th-opt').forEach(o => o.classList.toggle('sel', o.dataset.theme===savedTheme));

const savedW = localStorage.getItem('ewk-stage-w');
