<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--surface-app);font-family:var(--font-serif);padding:22px;color:var(--text-body);}
 .eyebrow{font-family:var(--font-sans);font-size:var(--fs-2xs);letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--ewk-gold-400);}
 .chapter{font-size:var(--fs-3xl);font-weight:900;color:var(--text-strong);line-height:var(--lh-tight);margin:4px 0 2px;}
 .sub{font-size:var(--fs-lg);font-style:italic;color:var(--text-muted);margin-bottom:16px;}
 .prose{font-size:var(--fs-prose);line-height:var(--lh-prose);color:var(--ewk-steel-100);text-indent:1.1em;max-width:60ch;text-wrap:pretty;}
</style></head><body>
 <div class="eyebrow">제2장 · CHAPTER TWO</div>
 <div class="chapter">계약으로 이어진 유산</div>
 <div class="sub">The Inherited Bequest</div>
 <p class="prose">칠흑 같은 밤. 여러분은 덜컹거리며 달리는 야간 화물열차 위에 올라 있습니다. 수로에서 흠뻑 젖은 옷이 사방에서 몰아치는 칼바람에 순식간에 얼어붙고, 체온이 급격하게 빠져나가기 시작합니다.</p>
</body></html>
