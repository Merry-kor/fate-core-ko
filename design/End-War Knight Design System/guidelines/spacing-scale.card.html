<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--surface-app);font-family:var(--font-sans);padding:20px;}
 .r{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
 .tok{width:60px;font-family:var(--font-mono);font-size:11px;color:var(--text-faint);}
 .bar{height:14px;background:linear-gradient(90deg,var(--ewk-gold-600),var(--ewk-gold-400));border-radius:2px;}
 .px{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
</style></head><body>
 <div class="r"><span class="tok">sp-1</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
 <div class="r"><span class="tok">sp-2</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
 <div class="r"><span class="tok">sp-3</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
 <div class="r"><span class="tok">sp-4</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
 <div class="r"><span class="tok">sp-5</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
 <div class="r"><span class="tok">sp-6</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
 <div class="r"><span class="tok">sp-7</span><div class="bar" style="width:48px"></div><span class="px">48</span></div>
 <div class="r"><span class="tok">sp-8</span><div class="bar" style="width:64px"></div><span class="px">64</span></div>
</body></html>
