<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--surface-app);font-family:var(--font-sans);padding:22px;color:var(--text-body);}
 .r{display:flex;align-items:baseline;gap:14px;padding:6px 0;border-bottom:1px solid var(--border-strong);}
 .r:last-child{border-bottom:none;}
 .tok{width:120px;font-family:var(--font-mono);font-size:11px;color:var(--text-faint);flex-shrink:0;}
 .sp{color:var(--text-strong);}
</style></head><body>
 <div class="r"><span class="tok">fs-xl / 700</span><span class="sp" style="font-size:var(--fs-xl);font-weight:700">루트비히 폰 아르님 중령</span></div>
 <div class="r"><span class="tok">fs-lg / 700</span><span class="sp" style="font-size:var(--fs-lg);font-weight:700">제1사단 스피어헤드</span></div>
 <div class="r"><span class="tok">fs-base / 500</span><span class="sp" style="font-size:var(--fs-base);font-weight:500">기능 & 특기 · 특수항목 · 일대기</span></div>
 <div class="r"><span class="tok">fs-sm / 600</span><span class="sp" style="font-size:var(--fs-sm);font-weight:600">운명점 발현 · 기회 만들기 · 극복</span></div>
 <div class="r"><span class="tok">fs-xs / 600</span><span class="sp" style="font-size:var(--fs-xs);font-weight:600;letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--text-muted)">STRESS · CONSEQUENCES</span></div>
 <div class="r"><span class="tok">fs-2xs / 700</span><span class="sp" style="font-size:var(--fs-2xs);font-weight:700;color:var(--ewk-gold-400)">#장기 · #단기</span></div>
</body></html>
