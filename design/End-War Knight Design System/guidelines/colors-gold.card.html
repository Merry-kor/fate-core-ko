<!-- @dsCard group="Colors" viewport="700x150" name="Imperial Gold — the Sun" subtitle="Primary accent: the End-War Knight's sun" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--surface-app);font-family:var(--font-sans);padding:18px;}
 .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
 .sw{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border-hairline);}
 .chip{height:70px;}
 .meta{padding:7px 8px;background:var(--surface-card);}
 .nm{font-size:var(--fs-2xs);color:var(--text-body);font-weight:700;}
 .hx{font-size:10px;color:var(--text-faint);font-family:var(--font-mono);}
</style></head><body>
<div class="grid">
 <div class="sw"><div class="chip" style="background:var(--ewk-gold-700)"></div><div class="meta"><div class="nm">gold-700</div><div class="hx">#6b5310</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-gold-600)"></div><div class="meta"><div class="nm">gold-600</div><div class="hx">#97761b</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-gold-500);box-shadow:0 0 18px var(--ewk-gold-glow)"></div><div class="meta"><div class="nm">gold-500 · primary</div><div class="hx">#c9a227</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-gold-400)"></div><div class="meta"><div class="nm">gold-400</div><div class="hx">#e0bc46</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-gold-300)"></div><div class="meta"><div class="nm">gold-300 · bright</div><div class="hx">#f0d271</div></div></div>
</div>
</body></html>
