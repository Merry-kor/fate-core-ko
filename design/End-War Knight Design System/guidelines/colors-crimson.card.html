<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">

 body{margin:0;background:var(--surface-app);font-family:var(--font-sans);padding:18px;}

 .sw{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border-hairline);}
 .chip{height:70px;}
 .meta{padding:7px 8px;background:var(--surface-card);}
 .nm{font-size:var(--fs-2xs);color:var(--text-body);font-weight:700;}
 .hx{font-size:10px;color:var(--text-faint);font-family:var(--font-mono);}
</style></head><body>
<div class="grid">
 <div class="sw"><div class="chip" style="background:var(--ewk-crimson-800)"></div><div class="meta"><div class="nm">crimson-800</div><div class="hx">#5e0f1c</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-crimson-700)"></div><div class="meta"><div class="nm">crimson-700</div><div class="hx">#8a162a</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-crimson-600);box-shadow:0 0 18px var(--ewk-crimson-glow)"></div><div class="meta"><div class="nm">crimson-600 · primary</div><div class="hx">#b01f33</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-crimson-500)"></div><div class="meta"><div class="nm">crimson-500</div><div class="hx">#d23148</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-crimson-400)"></div><div class="meta"><div class="nm">crimson-400 · bright</div><div class="hx">#e3556a</div></div></div>
</div>
</body></html>
