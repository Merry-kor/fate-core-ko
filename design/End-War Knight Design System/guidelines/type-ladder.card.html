<!-- @dsCard group="Type" viewport="700x190" name="The Ladder specimen" subtitle="페이트 사다리 · -4 끔찍함 → +8 전설적" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--surface-app);font-family:var(--font-sans);padding:18px;}
 .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px 28px;}
 .r{display:flex;align-items:center;gap:10px;padding:3px 0;}
 .n{width:34px;text-align:right;font-family:var(--font-mono);font-weight:700;font-variant-numeric:tabular-nums;}
 .w{font-family:var(--font-serif);font-size:var(--fs-md);color:var(--text-body);}
 .pos{color:var(--ewk-gold-300);} .zero{color:var(--text-muted);} .neg{color:var(--ewk-crimson-400);}
</style></head><body>
<div class="grid">
 <div class="r"><span class="n pos">+8</span><span class="w">전설적</span></div>
 <div class="r"><span class="n pos">+3</span><span class="w">우수</span></div>
 <div class="r"><span class="n pos">+7</span><span class="w">영웅적</span></div>
 <div class="r"><span class="n pos">+2</span><span class="w">양호</span></div>
 <div class="r"><span class="n pos">+6</span><span class="w">환상적</span></div>
 <div class="r"><span class="n pos">+1</span><span class="w">보통</span></div>
 <div class="r"><span class="n pos">+5</span><span class="w">엄청남</span></div>
 <div class="r"><span class="n zero">0</span><span class="w">미약</span></div>
 <div class="r"><span class="n pos">+4</span><span class="w">대단함</span></div>
 <div class="r"><span class="n neg">−2</span><span class="w">엉망</span></div>
</div>
</body></html>
