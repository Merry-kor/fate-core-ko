<!-- @dsCard group="Colors" viewport="700x180" name="Ink & Steel — dark UI surfaces" subtitle="The imperial night: app, card, well, input" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--surface-app);font-family:var(--font-sans);padding:18px;}
 .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
 .sw{border-radius:var(--radius-sm);border:1px solid var(--border-hairline);overflow:hidden;}
 .chip{height:64px;}
 .meta{padding:7px 8px;background:var(--surface-card);}
 .nm{font-size:var(--fs-2xs);color:var(--text-body);font-weight:700;}
 .hx{font-size:10px;color:var(--text-faint);font-family:var(--font-mono);}
</style></head><body>
<div class="grid">
 <div class="sw"><div class="chip" style="background:var(--ewk-ink-900)"></div><div class="meta"><div class="nm">ink-900</div><div class="hx">#0a0b0f</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-ink-800)"></div><div class="meta"><div class="nm">ink-800 · app</div><div class="hx">#14161e</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-ink-700)"></div><div class="meta"><div class="nm">ink-700 · card</div><div class="hx">#1f2330</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-ink-600)"></div><div class="meta"><div class="nm">ink-600</div><div class="hx">#2f3546</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-steel-400)"></div><div class="meta"><div class="nm">steel-400</div><div class="hx">#525c75</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-steel-100)"></div><div class="meta"><div class="nm">steel-100 · text</div><div class="hx">#c3cad9</div></div></div>
</div>
</body></html>
