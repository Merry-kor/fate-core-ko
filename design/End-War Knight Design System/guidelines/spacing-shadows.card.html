<!-- @dsCard group="Spacing" viewport="700x160" name="Elevation & glow" subtitle="Deep low-key shadows; gold/crimson glows" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--surface-app);font-family:var(--font-sans);padding:24px;display:flex;gap:22px;flex-wrap:wrap;}
 .c{width:118px;height:74px;background:var(--surface-card);border:1px solid var(--border-strong);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;}
 .l{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
</style></head><body>
 <div class="c" style="box-shadow:var(--shadow-sm)"><span class="l">sm</span></div>
 <div class="c" style="box-shadow:var(--shadow-md)"><span class="l">md</span></div>
 <div class="c" style="box-shadow:var(--shadow-lg)"><span class="l">lg</span></div>
 <div class="c" style="box-shadow:var(--shadow-gold)"><span class="l" style="color:var(--ewk-gold-400)">gold glow</span></div>
 <div class="c" style="box-shadow:var(--shadow-crimson)"><span class="l" style="color:var(--ewk-crimson-400)">crimson glow</span></div>
</body></html>
