<!-- @dsCard group="Colors" viewport="700x160" name="Parchment — the printed script" subtitle="Warm paper theme for novel chat & B5 log" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--paper-page);font-family:var(--font-sans);padding:18px;}
 .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
 .sw{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--paper-rule);}
 .chip{height:64px;}
 .meta{padding:7px 8px;background:var(--paper-panel);}
 .nm{font-size:var(--fs-2xs);color:var(--paper-text);font-weight:700;}
 .hx{font-size:10px;color:var(--paper-text-faint);font-family:var(--font-mono);}
 .note{grid-column:1/-1;font-family:var(--font-serif);font-style:italic;color:var(--paper-text-soft);font-size:var(--fs-sm);}
</style></head><body>
<div class="grid">
 <div class="sw"><div class="chip" style="background:var(--ewk-parch-100)"></div><div class="meta"><div class="nm">page</div><div class="hx">#f6efdd</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-parch-200)"></div><div class="meta"><div class="nm">panel</div><div class="hx">#efe5cc</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-parch-300)"></div><div class="meta"><div class="nm">rule</div><div class="hx">#e3d4af</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-parch-400)"></div><div class="meta"><div class="nm">border</div><div class="hx">#cbb588</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--ewk-parch-ink)"></div><div class="meta"><div class="nm">ink</div><div class="hx">#2a2317</div></div></div>
 <div class="note">"칠흑 같은 밤. 여러분은 달리는 야간 화물열차 위에 올라 있습니다." — 인쇄용 양피지 위의 명조 본문.</div>
</div>
</body></html>
