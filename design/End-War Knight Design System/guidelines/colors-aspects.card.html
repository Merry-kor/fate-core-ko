<!-- @dsCard group="Colors" viewport="700x130" name="Aspect-type semantics (면모)" subtitle="정체성 / 고민 / 일반 / 상황 / 장기 / 스택" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--surface-app);font-family:var(--font-sans);padding:18px;}
 .row{display:flex;gap:10px;}
 .a{flex:1;background:var(--surface-card);border:1px solid var(--border-strong);border-left:3px solid;border-radius:var(--radius-sm);padding:10px 11px;}
 .t{font-size:var(--fs-2xs);font-weight:700;letter-spacing:var(--ls-wide);}
 .h{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);margin-top:4px;}
</style></head><body>
<div class="row">
 <div class="a" style="border-left-color:var(--ewk-aspect-identity)"><div class="t" style="color:var(--ewk-aspect-identity)">정체성</div><div class="h">identity</div></div>
 <div class="a" style="border-left-color:var(--ewk-aspect-trouble)"><div class="t" style="color:var(--ewk-aspect-trouble)">고민</div><div class="h">trouble</div></div>
 <div class="a" style="border-left-color:var(--ewk-aspect-general)"><div class="t" style="color:var(--ewk-aspect-general)">일반</div><div class="h">general</div></div>
 <div class="a" style="border-left-color:var(--ewk-aspect-situation)"><div class="t" style="color:var(--ewk-aspect-situation)">상황</div><div class="h">situation</div></div>
 <div class="a" style="border-left-color:var(--ewk-aspect-longterm)"><div class="t" style="color:var(--ewk-aspect-longterm)">장기</div><div class="h">longterm</div></div>
 <div class="a" style="border-left-color:var(--ewk-aspect-stack)"><div class="t" style="color:var(--ewk-aspect-stack)">스택</div><div class="h">stack</div></div>
</div>
</body></html>
