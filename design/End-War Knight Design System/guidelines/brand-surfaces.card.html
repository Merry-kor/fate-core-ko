<!-- @dsCard group="Brand" viewport="700x240" name="Two surfaces" subtitle="Dark imperial UI ⟷ warm printed script" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;display:grid;grid-template-columns:1fr 1fr;height:100vh;font-family:var(--font-sans);}
 .pane{padding:22px;display:flex;flex-direction:column;gap:10px;}
 .dark{background:var(--surface-app);}
 .paper{background:var(--paper-page);
   background-image:radial-gradient(rgba(120,100,60,.05) 1px, transparent 1px);background-size:5px 5px;}
 .eyebrow{font-size:var(--fs-2xs);letter-spacing:var(--ls-label);text-transform:uppercase;}
 .dark .eyebrow{color:var(--ewk-gold-400);} .paper .eyebrow{color:var(--paper-text-faint);}
 .h{font-family:var(--font-serif);font-weight:900;font-size:var(--fs-xl);}
 .dark .h{color:var(--text-strong);} .paper .h{color:var(--paper-text);}
 .p{font-family:var(--font-serif);font-size:var(--fs-sm);line-height:var(--lh-prose);}
 .dark .p{color:var(--ewk-steel-100);} .paper .p{color:var(--paper-text-soft);}
 .chip{align-self:flex-start;font-size:var(--fs-2xs);font-weight:700;border-radius:999px;padding:2px 10px;}
 .dark .chip{color:var(--ewk-gold-300);background:color-mix(in srgb,var(--ewk-gold-500) 14%,transparent);border:1px solid var(--ewk-gold-600);}
 .paper .chip{color:#7a1626;background:#e9d9b8;border:1px solid var(--paper-rule);}
</style></head><body>
 <div class="pane dark">
   <span class="eyebrow">무대 · STAGE UI</span>
   <div class="h">살아있는 어둠의 인터페이스</div>
   <p class="p">강철과 그을음, 금빛 태양. HUD·무대·채팅이 칠흑 위에서 작동합니다.</p>
   <span class="chip">운명점 3</span>
 </div>
 <div class="pane paper">
   <span class="eyebrow">로그 · PRINTED SCRIPT</span>
   <div class="h">레제 드라마로 인쇄되는 기록</div>
   <p class="p">"칠흑 같은 밤. 여러분은 달리는 야간 화물열차 위에 올라 있습니다."</p>
   <span class="chip">B5 · 인쇄용</span>
 </div>
</body></html>
