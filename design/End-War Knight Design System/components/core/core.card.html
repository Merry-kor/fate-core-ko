  body { margin:0; background:var(--surface-app); color:var(--text-body); font-family:var(--font-sans); padding:22px; }

<body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Badge, Avatar, Tabs } = window.EndWarKnightDesignSystem_000168;
const base = "../portraits/";
function Demo() {
  return (
    <div>

        <Button variant="crimson" icon={<i className="fa-solid fa-gavel"/>}>이단 심문</Button>

        <Button variant="ghost" size="sm">자세히</Button>
        <Button variant="gold" disabled>비활성</Button>

      <div className="row"><span className="lbl">Badges & tags</span>
        <Badge tone="crimson" variant="solid">제1사단 스피어헤드</Badge>
        <Badge tone="gold">위관급 기사</Badge>
        <Badge tone="violet" size="sm">#장기</Badge>
        <Badge tone="steel" size="sm">#단기</Badge>
        <Badge tone="success" variant="outline">성공</Badge>
        <Badge tone="fail" variant="outline">실패</Badge>

      <div className="row"><span className="lbl">Avatars · the active ring marks the stage speaker</span>
        <Avatar src={base+"anya.png"} name="안야" size={52} ring="active"/>

        <Avatar src={base+"klaus.png"} name="클라우스" size={52} shape="frame" ring="crimson"/>

      <div className="row"><span className="lbl">Tabs · icon buttons</span>
        <div style={{width:300}}>
          <Tabs defaultValue="skills" items={[

        </div>
        <IconButton tone="gold" title="굴리기"><i className="fa-solid fa-dice-d20"/></IconButton>
        <IconButton tone="steel" title="수정"><i className="fa-solid fa-gear"/></IconButton>
        <IconButton tone="crimson" title="삭제"><i className="fa-solid fa-trash"/></IconButton>
      </div>
    </div>
  );

ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
